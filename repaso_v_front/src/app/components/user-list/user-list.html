<p-table [value]="users()" [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template #header>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th><p-button label="Add +" (click)="isReadonly.set(false);buttonMessage.set('Save');nuevo()" /></th>
        </tr>
    </ng-template>
    <ng-template #body let-user>
        <tr>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td>
                <div class="flex center-content-center">
                    <p-button label="Modify" (click)="isReadonly.set(false);buttonMessage.set('Save');modificar(user)" />
                </div>
            </td>
            <td>
                <div class="flex center-content-center">
                    <p-button label="Delete" (click)="isReadonly.set(true);buttonMessage.set('Delete');borrar(user)" />
                </div>
            </td>
        </tr>
    </ng-template>
</p-table>

<div class="card flex justify-center">
    <p-dialog header="User Information" [modal]="true" [(visible)]="visible" [style]="{ width: '25rem' }">
        <span class="p-text-secondary block mb-8">{{message()}}</span>
        <div class="flex items-center gap-4 mb-4">
            <label for="name" class="font-semibold w-24">Name</label>
            <input pInputText id="name" class="flex-auto" [readonly]="isReadonly()" autocomplete="off"
                [(ngModel)]="editUser().name" />
        </div>
        <div class="flex items-center gap-4 mb-8">
            <label for="email" class="font-semibold w-24">Email</label>
            <input pInputText id="email" class="flex-auto" [readonly]="isReadonly()" autocomplete="off"
                [(ngModel)]="editUser().email" />
        </div>
        <div class="flex items-center gap-4 mb-8">
            <label for="password" class="font-semibold w-24">Password</label>
            <input pInputText id="password" class="flex-auto" [readonly]="isReadonly()" autocomplete="off"
                [(ngModel)]="editUser().password" />
        </div>
        <div class="flex justify-end gap-2">
            <p-button label="Cancel" severity="secondary" (click)="visible=false" />
            <p-button label="{{buttonMessage()}}" (click)="guardar()" />
        </div>
    </p-dialog>
</div>

<p-dialog header="Error" [modal]="true" [(visible)]="mensajeVisible" [style]="{ width: '25rem' }">
    <span class="p-text-secondary block mb-8">{{errorMessage()}}</span>

    <div class="flex justify-end gap-2">
        <p-button label="Close" (click)="mensajeVisible.set(false)"/>
    </div>
</p-dialog>
